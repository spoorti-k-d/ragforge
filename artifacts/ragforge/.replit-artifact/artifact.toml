kind = "web"
previewPath = "/"
title = "RAG Forge"
version = "1.0.0"
id = "artifacts/ragforge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18324

[services.development]
run = "pnpm --filter @workspace/ragforge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ragforge", "run", "build" ]
publicDir = "artifacts/ragforge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18324"
BASE_PATH = "/"
